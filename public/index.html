<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grecostil - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="language-selector">
            <button onclick="changeLanguage('ro')">RO</button>
            <button onclick="changeLanguage('en')">EN</button>
            <button onclick="changeLanguage('ru')">RU</button>
        </div>
        
        <div class="login-box">
            <h1 data-i18n="app_title">Grecostil</h1>
            <h2 data-i18n="login_title">Login</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" data-i18n="username_or_email">Username or Email</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password" data-i18n="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-primary" data-i18n="login_btn">Login</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
