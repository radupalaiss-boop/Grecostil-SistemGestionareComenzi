<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grecostil - Projects</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">Grecostil</div>
    <div class="nav-right">
        <div class="language-selector-nav">
            <button onclick="changeLanguage('ro')">RO</button>
            <button onclick="changeLanguage('en')">EN</button>
            <button onclick="changeLanguage('ru')">RU</button>
        </div>
        <div class="user-info">
            <span id="username"></span>
            <button onclick="logout()" class="btn-logout" data-i18n="logout">Logout</button>
        </div>
    </div>
</nav>
    <div class="sidebar">
        <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
        <a href="project.html" class="active" data-i18n="projects">Projects</a>
        <a href="history.html" data-i18n="history">History</a>
    </div>
    
    <div class="main-content">
        <div class="page-header">
            <h1 data-i18n="projects">Projects</h1>
            <button onclick="openModal('projectModal')" class="btn-primary" data-i18n="add_project">Add Project</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchProjects" placeholder="Search projects..." data-i18n="search">
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
                <option value="on_hold">On Hold</option>
            </select>
        </div>
        
        <div id="projectsList" class="projects-grid"></div>
    </div>
    
    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="add_project">Add Project</h2>
                <span class="close-modal" onclick="closeModal('projectModal')">&times;</span>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectName" data-i18n="project_name">Project Name</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label for="clientName" data-i18n="client">Client</label>
                    <input type="text" id="clientName" required>
                </div>
                <div class="form-group">
                    <label for="projectStatus" data-i18n="status">Status</label>
                    <select id="projectStatus">
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="on_hold">On Hold</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="estimatedValue" data-i18n="estimated_value">Estimated Value (MDL)</label>
                    <input type="number" id="estimatedValue" step="0.01">
                </div>
                <button type="submit" class="btn-primary" data-i18n="create">Create</button>
            </form>
        </div>
    </div>
    

    
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/projects-list.js"></script>
</body>
</html>
