<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grecostil - Projects</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Grecostil</div>
        <div class="nav-right">
            <div class="language-selector-nav">
                <button onclick="changeLanguage('ro')">RO</button>
                <button onclick="changeLanguage('en')">EN</button>
                <button onclick="changeLanguage('ru')">RU</button>
            </div>
            <div class="user-info">
                <span id="username"></span>
                <button onclick="logout()" class="btn-logout" data-i18n="logout">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="sidebar">
        <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
        <a href="project.html" class="active" data-i18n="projects">Projects</a>
        <a href="history.html" data-i18n="history">History</a>
    </div>
    
    <div class="main-content">
        <!-- Secțiunea LISTĂ PROIECTE (apare doar când nu e selectat niciun proiect) -->
        <div id="projectsView">
            <div class="page-header">
                <h1 data-i18n="projects">Projects</h1>
                <button onclick="openModal('projectModal')" class="btn-primary" data-i18n="add_project">+ Add Project</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchProjects" placeholder="Search projects..." data-i18n="search">
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="completed">Completed</option>
                    <option value="on_hold">On Hold</option>
                </select>
            </div>
            
            <div id="projectsList" class="projects-grid"></div>
        </div>
        
        <!-- Secțiunea DETALII PROIECT (apare doar când e selectat un proiect) -->
        <div id="projectDetailsView" style="display: none;">
            <div class="project-header">
                <h1 id="projectName"></h1>
                <div class="project-info">
                    <div class="project-info-item">
                        <strong>Client</strong>
                        <span id="projectClient"></span>
                    </div>
                    <div class="project-info-item">
                        <strong>Status</strong>
                        <span id="projectStatus"></span>
                    </div>
                    <div class="project-info-item">
                        <strong>Total Value</strong>
                        <span id="projectValue"></span>
                    </div>
                </div>
                <button id="backToProjectsBtn" class="edit-project-btn" style="position: static; margin-top: 20px;">← Back to Projects</button>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2>Orders</h2>
                    <button id="addOrderBtn" class="btn-primary">+ Add Order</button>
                </div>
                <div id="ordersList"></div>
                <div class="order-total">
                    <strong>Order Total:</strong> <span id="orderTotal">0 MDL</span>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <h2>Offers</h2>
                    <button id="addOfferBtn" class="btn-primary">+ Create Offer</button>
                </div>
                <div id="offersList"></div>
            </div>
        </div>
    </div>
    
    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="add_project">Add Project</h2>
                <span class="close-modal" onclick="closeModal('projectModal')">&times;</span>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectName" data-i18n="project_name">Project Name</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label for="clientName" data-i18n="client">Client</label>
                    <input type="text" id="clientName" required>
                </div>
                <div class="form-group">
                    <label for="projectStatus" data-i18n="status">Status</label>
                    <select id="projectStatus">
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="on_hold">On Hold</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="estimatedValue" data-i18n="estimated_value">Estimated Value (MDL)</label>
                    <input type="number" id="estimatedValue" step="0.01">
                </div>
                <button type="submit" class="btn-primary" data-i18n="create">Create</button>
            </form>
        </div>
    </div>
    
    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Order</h2>
                <span class="close-modal" onclick="closeModal('orderModal')">&times;</span>
            </div>
            <form id="orderForm">
                <div class="form-group">
                    <label>Material Name</label>
                    <input type="text" id="materialName" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="unit" placeholder="kg, m, buc, etc." required>
                </div>
                <div class="form-group">
                    <label>Unit Price (MDL)</label>
                    <input type="number" id="unitPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Order Date</label>
                    <input type="date" id="orderDate" required>
                </div>
                <button type="button" id="saveOrderBtn" class="btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <!-- Offer Modal -->
    <div id="offerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Offer</h2>
                <span class="close-modal" onclick="closeModal('offerModal')">&times;</span>
            </div>
            <form id="offerForm">
                <div class="form-group">
                    <label>Offer Number</label>
                    <input type="text" id="offerNumber" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="offerStatus">
                        <option value="in_progress">In Progress</option>
                        <option value="transmitted">Transmitted</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Materials</label>
                    <div id="materialsContainer"></div>
                    <button type="button" id="addMaterialBtn" class="btn-secondary">+ Add Material</button>
                </div>
                <button type="button" id="saveOfferBtn" class="btn-primary">Create</button>
            </form>
        </div>
    </div>
    
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/project.js"></script>
</body>
</html>
